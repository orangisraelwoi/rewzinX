<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Architect 01 - WhatsApp Integration System</title>
    <style>
        :root {
            --primary: #00f3ff;
            --accent: #ff0055;
            --bg-dark: #080808;
            --glass: rgba(15, 15, 15, 0.95);
            --border: rgba(0, 243, 255, 0.3);
        }

        /* SCREEN LOCK & RESET */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'JetBrains Mono', 'Segoe UI', monospace;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--bg-dark); position: fixed; color: #ffffff;
        }

        body {
            display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        /* NOTIFICATION SYSTEM */
        #custom-alert {
            position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 380px; padding: 18px; 
            background: #000; border: 2px solid var(--primary);
            z-index: 10000; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
        }
        #custom-alert.active { transform: translate(-50%, 140px); }
        .alert-title { color: var(--primary); font-size: 0.75rem; font-weight: bold; display: block; margin-bottom: 5px; }
        .alert-text { color: #fff; font-size: 0.85rem; }

        /* MAIN CONTAINER */
        .system-container {
            background: var(--glass); border: 1px solid var(--border);
            padding: 35px; width: 94%; max-width: 420px;
            box-shadow: 0 0 50px rgba(0,0,0,1); position: relative;
        }

        header { border-bottom: 2px solid var(--border); margin-bottom: 25px; padding-bottom: 15px; }
        h1 { font-size: 1.2rem; color: var(--primary); letter-spacing: 4px; text-shadow: 0 0 10px var(--primary); }
        .subtitle { font-size: 0.65rem; color: #666; text-transform: uppercase; margin-top: 5px; }

        /* FORM STYLING */
        .form-group { margin-bottom: 20px; }
        label { font-size: 0.7rem; color: #aaa; display: block; margin-bottom: 8px; font-weight: bold; }
        
        input {
            width: 100%; background: #000; border: 1px solid #444;
            padding: 14px; color: var(--primary); outline: none;
            font-size: 0.9rem; transition: 0.3s; border-radius: 4px;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,243,255,0.3); }

        .btn {
            width: 100%; padding: 16px; border: none; cursor: pointer;
            font-size: 0.8rem; font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.3s; border-radius: 4px;
        }
        .btn-main { background: var(--primary); color: #000; margin-bottom: 12px; }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-sec { background: transparent; border: 1px solid #444; color: #888; }

        /* REACTION GRID */
        .reaction-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0;
        }
        .react-item {
            background: #111; border: 1px solid #333; padding: 15px 0;
            text-align: center; font-size: 1.4rem; cursor: pointer; transition: 0.2s;
        }
        .react-item.selected { border-color: var(--primary); background: rgba(0,243,255,0.15); transform: scale(1.1); box-shadow: 0 0 10px var(--primary); }

        .badge { position: absolute; top: 18px; right: 25px; padding: 5px 12px; font-size: 0.6rem; font-weight: bold; border-radius: 3px; }
        .badge-prem { background: #f39c12; color: #000; box-shadow: 0 0 10px #f39c12; }
        .badge-free { background: #333; color: #888; }
        
        .hidden { display: none !important; }
        .footer-info { font-size: 0.6rem; color: #444; text-align: center; margin-top: 20px; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="custom-alert">
        <span class="alert-title">[ ARCHITECT SYSTEM ]</span>
        <p id="alert-msg" class="alert-text"></p>
    </div>

    <div id="auth-section" class="system-container">
        <header>
            <h1>ACCESS KEY</h1>
            <p class="subtitle">VERIFY ENTITY: REZINX CORE</p>
        </header>
        <div class="form-group">
            <label>IDENTIFIER</label>
            <input type="text" id="user-in" placeholder="Username (rezinx)">
        </div>
        <div class="form-group">
            <label>PASSCODE</label>
            <input type="password" id="pass-in" placeholder="••••••••">
        </div>
        <button class="btn btn-main" onclick="processLogin()">LOGIN TO CORE</button>
        <button class="btn btn-sec" onclick="guestLogin()">BYPASS GUEST</button>
    </div>

    <div id="app-section" class="system-container hidden">
        <span id="tier-badge" class="badge badge-free">FREE_USER</span>
        <header>
            <h1>COMMAND_CENTER</h1>
            <p class="subtitle">WA_INTERACTION_V2.5</p>
        </header>

        <div class="form-group">
            <label>TARGET_CHANNEL_URL</label>
            <input type="text" id="wa-link" placeholder="https://whatsapp.com/channel/...">
        </div>

        <label>SELECT_PAYLOAD_EMOJI</label>
        <div class="reaction-grid">
            <div class="react-item" onclick="select(this)">🔥</div>
            <div class="react-item" onclick="select(this)">❤️</div>
            <div class="react-item" onclick="select(this)">😂</div>
            <div class="react-item" onclick="select(this)">💀</div>
            <div class="react-item" onclick="select(this)">😮</div>
            <div class="react-item" onclick="select(this)">🙏</div>
            <div class="react-item" onclick="select(this)">👍</div>
            <div class="react-item" onclick="select(this)">⚡</div>
        </div>

        <button class="btn btn-main" id="exec-btn" onclick="execute()">INITIATE_EXPLOIT</button>
        
        <div id="limit-box" style="text-align: center; margin-top: 10px;">
            <p id="limit-txt" style="font-size: 0.65rem; color: var(--accent);">QUOTA_REMAINING: 5/5</p>
        </div>

        <div class="footer-info">DEV: REZINX | INFRASTRUCTURE: ARCHITECT 01</div>
    </div>

    <script>
        // --- ARCHITECT 01 FINAL CONFIG ---
        let isPremium = false;
        let usage = parseInt(localStorage.getItem('wa_sys_used')) || 0;
        
        // --- LINK CLOUDFLARE LU YANG TADI BOSS REZINX ---
        const tunnelURL = "https://packard-physical-sailing-initiated.trycloudflare.com"; 

        function notify(msg) {
            const el = document.getElementById('custom-alert');
            document.getElementById('alert-msg').innerText = msg;
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 3500);
        }

        function processLogin() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            
            // KEY KHUSUS BUAT LU BOSS REZINX
            if(u.toLowerCase() === "rezinx" && p === "24032010") {
                isPremium = true;
                notify("ACCESS GRANTED. WELCOME BACK BOSS REZINX!");
                enterApp();
            } else if (u !== "" && p !== "") {
                notify("USER VERIFIED AS REGULAR ENTITY.");
                enterApp();
            } else {
                notify("DATA INCOMPLETE, ANJING!");
            }
        }

        function guestLogin() {
            notify("GUEST_BYPASS ACTIVE: QUOTA LIMITED.");
            enterApp();
        }

        function enterApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            syncUI();
        }

        function syncUI() {
            const badge = document.getElementById('tier-badge');
            const txt = document.getElementById('limit-txt');
            if (isPremium) {
                badge.innerText = "PREMIUM_Ω_LICENSE";
                badge.className = "badge badge-prem";
                txt.innerText = "INFINITY_QUOTA: UNRESTRICTED";
                txt.style.color = "#00f3ff";
            } else {
                let rem = 5 - usage;
                txt.innerText = `QUOTA_REMAINING: ${Math.max(0, rem)} / 5`;
                if(rem <= 0) {
                    const b = document.getElementById('exec-btn');
                    b.disabled = true; b.innerText = "QUOTA_LIMIT_REACHED";
                }
            }
        }

        function select(el) {
            document.querySelectorAll('.react-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        }

        async function execute() {
            const target = document.getElementById('wa-link').value.trim();
            const emoji = document.querySelector('.react-item.selected');

            if(!target) return notify("TARGET URL IS MISSING!");
            if(!emoji) return notify("SELECT REACTION PAYLOAD!");

            const btn = document.getElementById('exec-btn');
            btn.disabled = true; btn.innerText = "TRANSMITTING_PACKETS...";

            try {
                // FETCH SYSTEM DENGAN BYPASS CLOUDFLARE REMINDER
                const response = await fetch(`${tunnelURL}/react`, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        link: target,
                        emoji: emoji.innerText,
                        requester: isPremium ? "REZINX_ROOT" : "GUEST_USER",
                        timestamp: new Date().toISOString()
                    })
                });

                if(response.ok) {
                    notify("INJECTION_SENT: TARGET EXPLOITED!");
                    if(!isPremium) {
                        usage++;
                        localStorage.setItem('wa_sys_used', usage);
                        syncUI();
                    }
                } else {
                    notify(`TRANSMISSION_FAILED: CODE_${response.status}`);
                }
            } catch (e) {
                notify("CRITICAL_ERROR: BACKEND_SERVER_OFFLINE!");
                console.error("[DEBUG]", e);
            } finally {
                btn.disabled = false; btn.innerText = "INITIATE_EXPLOIT";
            }
        }

        // PREVENT PULL-TO-REFRESH
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
