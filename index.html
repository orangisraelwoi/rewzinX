<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Architect 01 - WhatsApp Integration System</title>
    <style>
        :root {
            --primary: #00f3ff;
            --accent: #ff0055;
            --bg-dark: #080808;
            --glass: rgba(20, 20, 20, 0.9);
            --border: rgba(0, 243, 255, 0.2);
        }

        /* SCREEN LOCK & RESET */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'JetBrains Mono', 'Segoe UI', monospace;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--bg-dark); position: fixed; color: #ffffff;
        }

        body {
            display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* NOTIFICATION SYSTEM */
        #custom-alert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; padding: 15px; 
            background: #000; border: 1px solid var(--primary);
            z-index: 10000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }
        #custom-alert.active { transform: translate(-50%, 120px); }
        .alert-title { color: var(--primary); font-size: 0.7rem; font-weight: bold; }
        .alert-text { color: #fff; font-size: 0.8rem; margin-top: 5px; }

        /* MAIN CONTAINER */
        .system-container {
            background: var(--glass); border: 1px solid var(--border);
            padding: 30px; width: 92%; max-width: 400px;
            box-shadow: 0 0 40px rgba(0,0,0,1); position: relative;
        }

        header { border-bottom: 1px solid var(--border); margin-bottom: 20px; padding-bottom: 10px; }
        h1 { font-size: 1rem; color: var(--primary); letter-spacing: 3px; }
        .subtitle { font-size: 0.6rem; color: #555; text-transform: uppercase; }

        /* FORM STYLING */
        .form-group { margin-bottom: 15px; }
        label { font-size: 0.65rem; color: #888; display: block; margin-bottom: 5px; }
        
        input {
            width: 100%; background: #000; border: 1px solid #333;
            padding: 12px; color: var(--primary); outline: none;
            font-size: 0.85rem; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,243,255,0.2); }

        .btn {
            width: 100%; padding: 14px; border: none; cursor: pointer;
            font-size: 0.7rem; font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.3s;
        }
        .btn-main { background: var(--primary); color: #000; margin-bottom: 10px; }
        .btn-main:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-sec { background: transparent; border: 1px solid #333; color: #666; }

        /* REACTION GRID */
        .reaction-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0;
        }
        .react-item {
            background: #111; border: 1px solid #222; padding: 12px 0;
            text-align: center; font-size: 1.2rem; cursor: pointer;
        }
        .react-item.selected { border-color: var(--primary); background: rgba(0,243,255,0.1); transform: scale(1.05); }

        .badge { position: absolute; top: 15px; right: 20px; padding: 3px 8px; font-size: 0.5rem; font-weight: bold; }
        .badge-prem { background: #f39c12; color: #000; }
        .badge-free { background: #333; color: #888; }
        
        .hidden { display: none !important; }
        .footer-info { font-size: 0.55rem; color: #333; text-align: center; margin-top: 15px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="custom-alert">
        <span class="alert-title">[ ARCHITECT SYSTEM ]</span>
        <p id="alert-msg" class="alert-text"></p>
    </div>

    <div id="auth-section" class="system-container">
        <header>
            <h1>ACCESS KEY</h1>
            <p class="subtitle">VERIFY ENTITY IDENTITY</p>
        </header>
        <div class="form-group">
            <label>IDENTIFIER</label>
            <input type="text" id="user-in" placeholder="Username">
        </div>
        <div class="form-group">
            <label>PASSCODE</label>
            <input type="password" id="pass-in" placeholder="••••••••">
        </div>
        <button class="btn btn-main" onclick="processLogin()">LOGIN TO CORE</button>
        <button class="btn btn-sec" onclick="guestLogin()">GUEST_ENTRY_BYPASS</button>
    </div>

    <div id="app-section" class="system-container hidden">
        <span id="tier-badge" class="badge badge-free">FREE_V01</span>
        <header>
            <h1>CMD_CENTER</h1>
            <p class="subtitle">WA_INTERACTION_INTEGRATOR</p>
        </header>

        <div class="form-group">
            <label>TARGET_URL (WA CHANNEL)</label>
            <input type="text" id="wa-link" placeholder="https://whatsapp.com/channel/...">
        </div>

        <label>REACTION_PAYLOAD</label>
        <div class="reaction-grid">
            <div class="react-item" onclick="select(this)">🔥</div>
            <div class="react-item" onclick="select(this)">❤️</div>
            <div class="react-item" onclick="select(this)">😂</div>
            <div class="react-item" onclick="select(this)">💀</div>
            <div class="react-item" onclick="select(this)">😮</div>
            <div class="react-item" onclick="select(this)">🙏</div>
            <div class="react-item" onclick="select(this)">👍</div>
            <div class="react-item" onclick="select(this)">⚡</div>
        </div>

        <button class="btn btn-main" id="exec-btn" onclick="execute()">INITIATE_EXPLOIT</button>
        
        <div id="limit-box" style="text-align: center; margin-top: 10px;">
            <p id="limit-txt" style="font-size: 0.6rem; color: var(--accent);">QUOTA: 5/5</p>
        </div>

        <div class="footer-info">DEV: REZINX | INFRASTRUCTURE: ARCHITECT 01</div>
    </div>

    <script>
        // --- ARCHITECT 01 GLOBAL CONFIG ---
        let isPremium = false;
        let usage = parseInt(localStorage.getItem('wa_sys_used')) || 0;
        
        // PASTIIN TUNNEL LU AKTIF DI TERMUX!
        const tunnelURL = "https://rezinx-ganteng.loca.lt"; 

        function notify(msg) {
            const el = document.getElementById('custom-alert');
            document.getElementById('alert-msg').innerText = msg;
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 3000);
        }

        function processLogin() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            if(!u || !p) return notify("DATA KOSONG, ANJING!");

            if(u.toLowerCase() === "rezinx" && p === "24032010") {
                isPremium = true;
                notify("WELCOME BACK, BOSS REZINX!");
                enterApp();
            } else {
                notify("USER TIDAK DIKENAL. GUEST MODE ACTIVE.");
                enterApp();
            }
        }

        function guestLogin() {
            notify("GUEST MODE: LIMIT 5x/DAY ACTIVE.");
            enterApp();
        }

        function enterApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            syncUI();
        }

        function syncUI() {
            const badge = document.getElementById('tier-badge');
            const txt = document.getElementById('limit-txt');
            if (isPremium) {
                badge.innerText = "PREMIUM_LEVEL_Ω";
                badge.className = "badge badge-prem";
                txt.innerText = "INFINITY_ACCESS: ENABLED";
                txt.style.color = "#00f3ff";
            } else {
                let rem = 5 - usage;
                txt.innerText = `QUOTA_REMAINING: ${Math.max(0, rem)} / 5`;
                if(rem <= 0) {
                    const b = document.getElementById('exec-btn');
                    b.disabled = true; b.innerText = "QUOTA_EXCEEDED";
                }
            }
        }

        function select(el) {
            document.querySelectorAll('.react-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        }

        async function execute() {
            const target = document.getElementById('wa-link').value.trim();
            const emoji = document.querySelector('.react-item.selected');

            if(!target) return notify("URL TARGET MANA, GOBLOK?");
            if(!emoji) return notify("PILIH EMOJI DULU!");

            const btn = document.getElementById('exec-btn');
            btn.disabled = true; btn.innerText = "SENDING_DATA...";

            try {
                // FIXED FETCH PROTOCOL
                const response = await fetch(`${tunnelURL}/react`, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Bypass-Tunnel-Reminder': 'true' 
                    },
                    body: JSON.stringify({
                        link: target,
                        emoji: emoji.innerText,
                        requester: isPremium ? "PREMIUM" : "GUEST"
                    })
                });

                if(response.ok) {
                    notify("INJECTION_SUCCESS: CHECK CHANNEL!");
                    if(!isPremium) {
                        usage++;
                        localStorage.setItem('wa_sys_used', usage);
                        syncUI();
                    }
                } else {
                    notify(`FAILED: SERVER_REJECTED (${response.status})`);
                }
            } catch (e) {
                notify("CRITICAL: BACKEND_UNREACHABLE!");
                console.error(e);
            } finally {
                btn.disabled = false; btn.innerText = "INITIATE_EXPLOIT";
            }
        }

        // NO SCROLLING / RELOAD PROTECTION
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
